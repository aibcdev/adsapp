app = "aibc-api"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile"

[env]
  AIBC_PUBLIC_URL = "https://api.aibcmedia.com"
  AIBC_PORTAL_URL = "https://aibcmedia.com"
  PORT = "8787"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "aibc_data"
  destination = "/data"

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"
