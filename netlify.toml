[build]
  command = "npm ci && npm run build --workspace=@aibc/shared && npm run build --workspace=@aibc/portal"
  publish = "packages/portal/dist"

[build.environment]
  NODE_VERSION = "22"

# SPA routing (React Router) — also mirrored in packages/portal/public/_redirects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
