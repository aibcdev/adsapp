services:
  api:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - aibc_data:/data
    expose:
      - "8787"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  aibc_data:
  caddy_data:
  caddy_config:
